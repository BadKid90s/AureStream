name: 手动构建生产安装包

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '构建目标平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
      release_tag:
        description: '版本标签 (留空则使用 package.json 中的版本号)'
        required: false
        default: ''

jobs:
  # ─────────────────────────────────────────────
  # macOS 构建 (Apple Silicon + Intel Universal)
  # ─────────────────────────────────────────────
  build-macos:
    name: 构建 macOS 安装包
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: 获取 pnpm store 路径
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 下载 macOS sing-box sidecar
        run: |
          # 如果仓库已经包含了 sidecar 二进制则跳过，否则下载最新版
          if [ ! -f "src-tauri/binaries/sing-box-x86_64-apple-darwin" ]; then
            echo "Sidecar not found, downloading latest sing-box..."
            SINGBOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            curl -L "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-darwin-amd64.tar.gz" | tar xz -C /tmp
            cp "/tmp/sing-box-${SINGBOX_VERSION}-darwin-amd64/sing-box" src-tauri/binaries/sing-box-x86_64-apple-darwin
            cp src-tauri/binaries/sing-box-x86_64-apple-darwin src-tauri/binaries/sing-box-aarch64-apple-darwin
            chmod +x src-tauri/binaries/sing-box-x86_64-apple-darwin
            chmod +x src-tauri/binaries/sing-box-aarch64-apple-darwin
          else
            echo "Sidecar binary already present, skipping download."
          fi

      - name: 构建 macOS 安装包 (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target universal-apple-darwin

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AureStream-macOS-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          retention-days: 14

  # ─────────────────────────────────────────────
  # Windows 构建 (x86_64 MSVC)
  # ─────────────────────────────────────────────
  build-windows:
    name: 构建 Windows 安装包
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: 获取 pnpm store 路径
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 检查 Windows sidecar 是否存在
        shell: bash
        run: |
          if [ ! -f "src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe" ]; then
            echo "ERROR: Windows sidecar binary not found at src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe"
            echo "Please add the binary to the repository or configure the download step."
            exit 1
          else
            echo "Windows sidecar binary found."
          fi

      - name: 构建 Windows 安装包 (NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AureStream-Windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 14
