# 构建各桌面平台安装包产物。
# 产物：Linux deb/rpm/AppImage、Windows NSIS (-setup.exe)、macOS dmg（x86_64 + aarch64）。
#
# 触发：workflow_dispatch（手动）、release published（自动上传到 Release）。

name: Build desktop bundles

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Download mihomo (host triple)
        shell: bash
        run: npm run mihomo:download

      - name: Build Tauri bundle
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS_NAME" == "macOS" ]]; then
            npm run tauri build -- --ci --target ${{ matrix.rust_target }} --bundles dmg
          else
            npm run tauri build -- --ci --target ${{ matrix.rust_target }}
          fi

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AureStream-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
          if-no-files-found: error

  upload-release:
    name: Upload assets to GitHub Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: AureStream-*
          merge-multiple: false

      - name: Collect installers for upload
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -type f \( \
            -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.exe' -o -name '*.dmg' \
          \) -print0 | while IFS= read -r -d '' f; do
            rel="${f#release-assets/}"
            safe="${rel//\//__}"
            cp "$f" "upload/$safe"
          done
          ls -la upload/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
