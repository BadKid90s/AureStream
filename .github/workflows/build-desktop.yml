name: Build desktop bundles

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Download mihomo (host triple)
        shell: bash
        run: npm run mihomo:download

      - name: Build Tauri bundle
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS_NAME" == "macOS" ]]; then
            npm run tauri build -- --ci --target ${{ matrix.rust_target }} --bundles dmg
          elif [[ "$RUNNER_OS_NAME" == "Windows" ]]; then
            npm run tauri build -- --ci --target ${{ matrix.rust_target }} --bundles nsis
          else
            npm run tauri build -- --ci --target ${{ matrix.rust_target }} --bundles deb,rpm,appimage
          fi

      # === Windows Portable Zip ===
      - name: Create Windows portable zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ReleaseDir = "src-tauri/target/${{ matrix.rust_target }}/release"
          $PortableDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "portable") -Force

          Copy-Item "$ReleaseDir\AureStream.exe" $PortableDir

          $Mihomo = Get-ChildItem "$ReleaseDir" -Filter "mihomo*.exe" | Select-Object -First 1
          if ($Mihomo) { Copy-Item $Mihomo.FullName $PortableDir }

          $Version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $ZipName = "AureStream_${Version}_windows_x64_portable.zip"
          $ZipPath = Join-Path "$ReleaseDir\bundle" $ZipName

          if (-not (Test-Path "$ReleaseDir\bundle")) { New-Item -ItemType Directory -Path "$ReleaseDir\bundle" | Out-Null }

          Compress-Archive -Path "$PortableDir\*" -DestinationPath $ZipPath -Force
          Write-Host "便携版: $ZipPath"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          mkdir -p release-files
          find "$BUNDLE_DIR" -type f \( \
            -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.exe' -o -name '*.dmg' -o -name '*portable*.zip' \
          \) -exec cp {} release-files/ \;
          echo "=== release-files ==="
          ls -lh release-files/
          echo "=== file count ==="
          find release-files -type f | wc -l

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AureStream-${{ matrix.name }}
          path: release-files/
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== uploading files ==="
          ls -lh release-files/
          for f in release-files/*; do
            echo "Uploading: $f"
            gh release upload "${{ github.event.release.tag_name }}" \
              "$f" \
              --repo "${{ github.repository }}" \
              --clobber
          done