name: Build desktop bundles

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            os: macos-latest
            rust_target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2

      - name: Install NSIS and 7-Zip (Windows)
        if: matrix.os == 'windows-2025'
        run: choco install nsis 7zip -y

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-on-failure: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Download external binaries and databases
        run: pnpm download-binaries

      - name: Build Windows TUN service
        if: matrix.os == 'windows-2025'
        run: pnpm build-tun --release

      - name: Build macOS privileged helper
        if: runner.os == 'macOS'
        run: pnpm pre-bundle

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.rust_target }}

      - name: Collect updater manifest
        shell: bash
        run: |
          LATEST=$(find src-tauri/target/${{ matrix.rust_target }}/release/bundle -name 'latest.json' -print -quit)
          if [ -n "$LATEST" ]; then
            mkdir -p updater-artifacts
            cp "$LATEST" "updater-artifacts/latest-${{ matrix.name }}.json"
            echo "Collected updater manifest for ${{ matrix.name }}"
          else
            echo "Warning: latest.json not found for ${{ matrix.name }}"
          fi

      - name: Upload updater manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: updater-json-${{ matrix.name }}
          path: updater-artifacts/latest-${{ matrix.name }}.json
          if-no-files-found: warn

      - name: Create Windows portable zip
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="src-tauri/target/${{ matrix.rust_target }}/release"
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis"
          PORTABLE_DIR=$(mktemp -d)

          MAIN_EXE=$(find "$RELEASE_DIR" -maxdepth 1 -iname "aurestream.exe" -print -quit)
          if [ -n "$MAIN_EXE" ]; then
            cp "$MAIN_EXE" "$PORTABLE_DIR/aurestream.exe"
          else
            echo "Error: Main executable (aurestream.exe) not found in $RELEASE_DIR"
            exit 1
          fi

          AURESTREAM_CORE=$(find "$RELEASE_DIR" -maxdepth 1 -name "aurestream-core*.exe" -print -quit)
          if [ -n "$AURESTREAM_CORE" ]; then
            cp "$AURESTREAM_CORE" "$PORTABLE_DIR/"
          fi
          
          TUNSERVICE=$(find "$RELEASE_DIR" -maxdepth 1 -name "tun-service*.exe" -print -quit)
          if [ -n "$TUNSERVICE" ]; then
            cp "$TUNSERVICE" "$PORTABLE_DIR/"
          fi

          touch "$PORTABLE_DIR/portable"

          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | sed -E 's/.*"([^"]+)".*/\1/')
          ZIP_NAME="aurestream_${VERSION}_windows_x64_portable.zip"
          cd "$PORTABLE_DIR"
          7z a "$BUNDLE_DIR/$ZIP_NAME" *
          echo "Portable ZIP: $BUNDLE_DIR/$ZIP_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AureStream-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*portable*.zip
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
          if-no-files-found: warn

      - name: Prepare Release Assets
        if: github.event_name == 'release'
        shell: bash
        run: |
          mkdir -p release-files
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | sed -E 's/.*"([^"]+)".*/\1/')
          TARGET_NAME="${{ matrix.name }}"
          TARGET_OS="${TARGET_NAME%-*}"
          TARGET_ARCH="${TARGET_NAME##*-}"

          find src-tauri/target/${{ matrix.rust_target }}/release/bundle -type f \( \
            -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.exe' -o -name '*.dmg' -o -name '*portable*.zip' \
          \) -print0 | while IFS= read -r -d '' f; do
            filename=$(basename "$f")
            case "$filename" in
              *.deb|*.rpm)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}.${filename##*.}"
                ;;
              *.AppImage)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}.AppImage"
                ;;
              *portable*.zip)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}_portable.zip"
                ;;
              *-setup.exe|*.exe)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}_setup.exe"
                ;;
              *.msi)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}.msi"
                ;;
              *.dmg)
                cp "$f" "release-files/aurestream_${VERSION}_${TARGET_OS}_${TARGET_ARCH}.dmg"
                ;;
              *)
                cp "$f" "release-files/${filename}"
                ;;
            esac
          done
          ls -la release-files/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge-updater-json:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download updater manifests
        uses: actions/download-artifact@v7
        with:
          pattern: updater-json-*
          merge-multiple: true
          path: updater-fragments

      - name: Merge and upload latest.json
        shell: bash
        run: |
          python3 -c "
          import json, glob, sys
          files = sorted(glob.glob('updater-fragments/latest-*.json'))
          if not files:
              print('No updater manifests found, skipping merge')
              sys.exit(0)
          merged = None
          for f in files:
              with open(f) as fh:
                  data = json.load(fh)
              if merged is None:
                  merged = data
              else:
                  merged['platforms'].update(data.get('platforms', {}))
          with open('latest.json', 'w') as fh:
              json.dump(merged, fh, indent=2)
          print(f'Merged platforms: {list(merged[\"platforms\"].keys())}')
          "

      - name: Upload latest.json to Release
        if: hashFiles('latest.json') != ''
        uses: softprops/action-gh-release@v3
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
