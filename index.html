<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>AureStream</title>
  <script>
    (function() {
      var theme = localStorage.getItem('aurestream-theme');
      var resolved = 'light';
      if (theme === 'dark') resolved = 'dark';
      else if (theme === 'light') resolved = 'light';
      else if (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) resolved = 'dark';
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
