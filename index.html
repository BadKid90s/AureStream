<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AureStream</title>
    <script>
      (function () {
        var theme = localStorage.getItem("theme") || "system";
        if (
          theme === "dark" ||
          (theme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #eceef2;
      }
      html.dark,
      html.dark body {
        background: #0c0e12;
      }
      #root {
        min-height: 100%;
        height: 100%;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(
          ellipse 80% 60% at 50% 42%,
          rgba(37, 99, 235, 0.09) 0%,
          transparent 68%
        ),
        #eceef2;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      html.dark #boot-splash {
        background: radial-gradient(
          ellipse 80% 60% at 50% 42%,
          rgba(37, 99, 235, 0.14) 0%,
          transparent 68%
        ),
        #0c0e12;
      }
      #boot-splash.boot-splash-exit {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        animation: boot-fade-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .boot-loader {
        position: relative;
        width: 160px;
        height: 160px;
      }
      .boot-glow {
        position: absolute;
        inset: 8px;
        border-radius: 9999px;
        background: rgba(37, 99, 235, 0.14);
        filter: blur(22px);
      }
      html.dark .boot-glow {
        background: rgba(59, 130, 246, 0.18);
      }
      .boot-ring {
        position: absolute;
        inset: 0;
        animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1);
        animation-iteration-count: infinite;
      }
      .boot-ring-outer {
        animation: boot-spin 1.05s infinite;
      }
      .boot-ring-inner {
        inset: 19px;
        animation: boot-spin-reverse 1.35s infinite;
      }
      .boot-ring svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .boot-logo {
        position: absolute;
        inset: 39px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: linear-gradient(145deg, #4d73ff 0%, #254eff 100%);
        box-shadow: 0 10px 28px rgba(37, 99, 235, 0.32);
      }
      .boot-logo img {
        width: 58%;
        height: 58%;
        object-fit: contain;
      }
      .boot-brand {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: #0f1419;
      }
      html.dark .boot-brand {
        color: #f3f4f6;
      }
      .boot-subtitle {
        margin-top: -14px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #5c6570;
      }
      html.dark .boot-subtitle {
        color: #9aa0a6;
      }
      @keyframes boot-fade-in {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-spin-reverse {
        to {
          transform: rotate(-360deg);
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="boot-splash" role="status" aria-live="polite" aria-busy="true">
      <div class="boot-center">
        <div class="boot-loader" aria-hidden="true">
          <div class="boot-glow"></div>
          <div class="boot-ring boot-ring-outer">
            <svg viewBox="0 0 120 120" fill="none">
              <circle
                cx="60"
                cy="60"
                r="52"
                stroke="rgba(37, 99, 235, 0.12)"
                stroke-width="3"
              />
              <circle
                cx="60"
                cy="60"
                r="52"
                stroke="url(#boot-grad-outer)"
                stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="98 229"
                transform="rotate(-90 60 60)"
              />
            </svg>
          </div>
          <div class="boot-ring boot-ring-inner">
            <svg viewBox="0 0 92 92" fill="none">
              <circle
                cx="46"
                cy="46"
                r="40"
                stroke="rgba(37, 99, 235, 0.08)"
                stroke-width="2.5"
              />
              <circle
                cx="46"
                cy="46"
                r="40"
                stroke="url(#boot-grad-inner)"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-dasharray="58 193"
                transform="rotate(-90 46 46)"
              />
            </svg>
          </div>
          <div class="boot-logo">
            <img src="/logo2.png" alt="" />
          </div>
        </div>
        <div class="boot-brand">AureStream</div>
        <div class="boot-subtitle" id="boot-subtitle">正在启动...</div>
      </div>
      <svg width="0" height="0" aria-hidden="true">
        <defs>
          <linearGradient id="boot-grad-outer" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563eb" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
          <linearGradient id="boot-grad-inner" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#4f46e5" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var el = document.getElementById("boot-subtitle");
        if (!el) return;
        var lang = localStorage.getItem("language");
        if (!lang) {
          lang =
            navigator.language && navigator.language.toLowerCase().indexOf("zh") === 0
              ? "zh"
              : "en";
        }
        el.textContent = lang === "en" ? "Starting..." : "正在启动...";
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
